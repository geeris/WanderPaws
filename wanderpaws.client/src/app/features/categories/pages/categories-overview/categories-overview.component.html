<p-treeTable [value]="data" [scrollable]="true" styleClass="m-5" [tableStyle]="{'min-width':'50rem'}">
  <ng-template pTemplate="header">
    <tr>
      <th>Name</th>
      <th>Type</th>
      <th></th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-node let-category="node">
    <tr>
      <td>
        <p-treeTableToggler [rowNode]="node"></p-treeTableToggler>
        {{ category.name }}
        <p-badge *ngIf="category.isPredefined" class="ml-1" severity="secondary" value="Default" />
        <!-- <p-tag value="Default" /> -->
      </td>
      <td>{{ categoryType[category.type] }}</td>
      <td>
        <div class="flex justify-content-end align-items-center mr-5">
          <p-badge *ngIf="category.children.length > 0" class="mr-2" severity="secondary"
            [value]="category.children.length" />

          <span class="pi pi-ellipsis-h cursor-pointer" (click)="onItemClick(category, actionsMenu, $event)"></span>
          <p-tieredMenu #actionsMenu [model]="actions" [popup]="true" appendTo="body" />
        </div>
      </td>
    </tr>
  </ng-template>
</p-treeTable>

<p-dialog header="New Category" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }">
  <div class="flex flex-column gap-2 text-left mb-4">
    <label for="email">E-mail</label>
    <input pInputText id="email" name="email" aria-describedby="email-help" required />
  </div>
  <div class="flex flex-column gap-2 text-left mb-4">
    <label for="email">E-mail</label>
    <input pInputText id="email" name="email" aria-describedby="email-help" required />
  </div>
  <div class="flex flex-column gap-2 text-left mb-4">
    <label for="email">E-mail</label>
    <input pInputText id="email" name="email" aria-describedby="email-help" required />
  </div>
  <div class="flex justify-end gap-2">
    <p-button label="Cancel" severity="secondary" (click)="visible = false" />
    <p-button label="Save" (click)="createCategory()" />
  </div>
</p-dialog>
